<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeScope — Authenticating...</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Barlow:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090d;
    --s1: #0d1017;
    --border: #1c2133;
    --green: #0dff8c;
    --red: #ff3b5c;
    --yellow: #ffc83d;
    --text: #dde2ef;
    --muted: #4a5168;
    --white: #f0f4ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(13,255,140,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(13,255,140,0.025) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events:none;
  }
  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 90%;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }
  .brand {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--white);
    margin-bottom: 32px;
  }
  .brand em { color: var(--green); font-style: normal; }

  .status-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }
  .status-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 10px;
    color: var(--white);
  }
  .status-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .code-box {
    background: var(--bg);
    border: 1px solid rgba(13,255,140,0.3);
    border-radius: 10px;
    padding: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--green);
    word-break: break-all;
    text-align: left;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }

  .copy-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 12px;
  }
  .copy-btn:hover { background: #3dffaa; }
  .copy-btn.copied { background: #1a3a2a; color: var(--green); border: 1px solid rgba(13,255,140,0.3); }

  .go-btn {
    background: transparent;
    color: var(--green);
    border: 1px solid rgba(13,255,140,0.3);
    border-radius: 8px;
    padding: 12px 28px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-decoration: none;
    display: block;
  }
  .go-btn:hover { background: rgba(13,255,140,0.07); }

  .err-box {
    background: rgba(255,59,92,0.07);
    border: 1px solid rgba(255,59,92,0.2);
    border-radius: 10px;
    padding: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--red);
    text-align: left;
    line-height: 1.6;
  }

  .spin {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Trade<em>Scope</em></div>
  <div id="content">
    <div class="spin"></div>
    <div class="status-title">Processing login...</div>
    <div class="status-sub">Extracting auth code from Upstox...</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');
  const cont  = document.getElementById('content');

  if (error) {
    cont.innerHTML = `
      <span class="status-icon">❌</span>
      <div class="status-title">Login Failed</div>
      <div class="status-sub">Upstox returned an error.</div>
      <div class="err-box">Error: ${error}<br>${params.get('error_description')||''}</div>
    `;
  } else if (code) {
    // Store in sessionStorage so index.html can pick it up
    sessionStorage.setItem('upstox_auth_code', code);

    cont.innerHTML = `
      <span class="status-icon">✅</span>
      <div class="status-title">Login Successful!</div>
      <div class="status-sub">Your auth code is ready.<br>Copy it or go straight to TradeScope.</div>
      <div class="code-box" id="codeBox">${code}</div>
      <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy Auth Code</button>
      <a class="go-btn" href="./index.html">→ Open TradeScope</a>
    `;
  } else {
    cont.innerHTML = `
      <span class="status-icon">⚠️</span>
      <div class="status-title">No Code Found</div>
      <div class="status-sub">This page should only be opened via Upstox login redirect.<br>Go back to TradeScope and click "Connect Upstox".</div>
      <a class="go-btn" href="./index.html">← Back to TradeScope</a>
    `;
  }

  function copyCode() {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Auth Code'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
